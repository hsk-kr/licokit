dotfiles:
  config_links:
    - aerospace
    - devdeck
    - karabiner
    - neru
    - nvim
    - tmux
    - zsh
    - alacritty
    - ghostty
  home_links:
    scripts: scripts
  extra_links:
    - source: claude/docs
      target: ~/.claude/docs
    - source: claude/settings.json
      target: ~/.claude/settings.json
    - source: claude/CLAUDE.md
      target: ~/.claude/CLAUDE.md
    - source: claude/statusline-command.sh
      target: ~/.claude/statusline-command.sh
    - source: claude/hooks
      target: ~/.claude/hooks
  post_scripts:
    - claude/memory/sync-memories.sh
    - claude/setup-plugins.sh
  zsh_source: "~/.config/zsh/zshrc"

tools:
  - name: Homebrew
    install_type: manual
    manual_message: 'You should install the homebrew manually. Use this command "/bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\""'
    detect_type: command
    detect_value: brew

  - name: Git
    install_type: brew
    package: git
    detect_type: command
    detect_value: git

  - name: WezTerm
    install_type: cask
    package: wezterm
    detect_type: application
    detect_value: WezTerm.app

  - name: Neovim
    install_type: brew
    package: neovim
    detect_type: command
    detect_value: nvim

  - name: tree-sitter-cli
    install_type: brew
    package: tree-sitter-cli
    detect_type: command
    detect_value: tree-sitter

  - name: tmux
    install_type: brew
    package: tmux
    detect_type: command
    detect_value: tmux

  - name: AeroSpace
    install_type: cask
    package: nikitabobko/tap/aerospace
    detect_type: application
    detect_value: AeroSpace.app

  - name: Neru
    install_type: cask
    package: y3owk1n/tap/neru
    detect_type: application
    detect_value: Neru.app

  - name: Karabiner Elements
    install_type: cask
    package: karabiner-elements
    detect_type: application
    detect_value: Karabiner-Elements.app

  - name: Snipaste
    install_type: cask
    package: snipaste
    detect_type: application
    detect_value: Snipaste.app

  - name: ripgrep
    install_type: brew
    package: ripgrep
    detect_type: command
    detect_value: rg

  - name: fzf
    install_type: brew
    package: fzf
    detect_type: command
    detect_value: fzf

  - name: zsh-vi-mode
    install_type: brew
    package: zsh-vi-mode
    detect_type: brew_package
    detect_value: zsh-vi-mode
    zsh_source: "source $(brew --prefix)/opt/zsh-vi-mode/share/zsh-vi-mode/zsh-vi-mode.plugin.zsh"
    post_install_warning: "Run source ~/.zshrc to use zsh-vi-mode without reopening the terminal."

  - name: docker
    install_type: cask
    package: docker
    detect_type: command
    detect_value: docker

  - name: go
    install_type: brew
    package: go
    detect_type: command
    detect_value: go

  - name: nvm
    install_type: brew
    package: nvm
    detect_type: brew_package
    detect_value: nvm
    zsh_source: |-
      export NVM_DIR="$HOME/.nvm"
       [ -s "$HOMEBREW_PREFIX/opt/nvm/nvm.sh" ] && \. "$HOMEBREW_PREFIX/opt/nvm/nvm.sh"
       [ -s "$HOMEBREW_PREFIX/opt/nvm/etc/bash_completion.d/nvm" ] && \. "$HOMEBREW_PREFIX/opt/nvm/etc/bash_completion.d/nvm"
    post_install_warning: "Run source ~/.zshrc to use nvm without reopening the terminal."
    post_install_dirs:
      - ~/.nvm

  - name: Ghostty
    install_type: cask
    package: ghostty
    detect_type: application
    detect_value: Ghostty.app

  - name: btop
    install_type: brew
    package: btop
    detect_type: command
    detect_value: btop

  - name: terminal-notifier
    install_type: brew
    package: terminal-notifier
    detect_type: command
    detect_value: terminal-notifier

  - name: Claude Code
    install_type: script
    install_command: "curl -fsSL https://claude.ai/install.sh | bash"
    detect_type: command
    detect_value: claude
