# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# act like vim
set-window-option -g mode-keys vi

# plugins
set -g @plugin 'tmux-plugins/tpm' 

# tmux
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"

bind-key -N "Reload the config file" r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# send Enter to a specific pane (prefix + e + 1-5)
bind-key e switch-client -T send-enter
bind-key -T send-enter 1 send-keys -t :.1 C-m
bind-key -T send-enter 2 send-keys -t :.2 C-m
bind-key -T send-enter 3 send-keys -t :.3 C-m
bind-key -T send-enter 4 send-keys -t :.4 C-m
bind-key -T send-enter 5 send-keys -t :.5 C-m

# scroll up in a specific pane (prefix + u + 0-5)
bind-key u switch-client -T scroll-up
bind-key -T scroll-up 0 copy-mode -t :.0 \; send-keys -t :.0 -X halfpage-up
bind-key -T scroll-up 1 copy-mode -t :.1 \; send-keys -t :.1 -X halfpage-up
bind-key -T scroll-up 2 copy-mode -t :.2 \; send-keys -t :.2 -X halfpage-up
bind-key -T scroll-up 3 copy-mode -t :.3 \; send-keys -t :.3 -X halfpage-up
bind-key -T scroll-up 4 copy-mode -t :.4 \; send-keys -t :.4 -X halfpage-up
bind-key -T scroll-up 5 copy-mode -t :.5 \; send-keys -t :.5 -X halfpage-up

# scroll down in a specific pane (prefix + o + 0-5)
bind-key o switch-client -T scroll-down
bind-key -T scroll-down 0 copy-mode -t :.0 \; send-keys -t :.0 -X halfpage-down
bind-key -T scroll-down 1 copy-mode -t :.1 \; send-keys -t :.1 -X halfpage-down
bind-key -T scroll-down 2 copy-mode -t :.2 \; send-keys -t :.2 -X halfpage-down
bind-key -T scroll-down 3 copy-mode -t :.3 \; send-keys -t :.3 -X halfpage-down
bind-key -T scroll-down 4 copy-mode -t :.4 \; send-keys -t :.4 -X halfpage-down
bind-key -T scroll-down 5 copy-mode -t :.5 \; send-keys -t :.5 -X halfpage-down

# copy last 300 lines from a specific pane to clipboard (prefix + y + 0-5)
bind-key y switch-client -T copy-pane
bind-key -T copy-pane 0 run-shell 'tmux capture-pane -t :.0 -p -S -300 | pbcopy'
bind-key -T copy-pane 1 run-shell 'tmux capture-pane -t :.1 -p -S -300 | pbcopy'
bind-key -T copy-pane 2 run-shell 'tmux capture-pane -t :.2 -p -S -300 | pbcopy'
bind-key -T copy-pane 3 run-shell 'tmux capture-pane -t :.3 -p -S -300 | pbcopy'
bind-key -T copy-pane 4 run-shell 'tmux capture-pane -t :.4 -p -S -300 | pbcopy'
bind-key -T copy-pane 5 run-shell 'tmux capture-pane -t :.5 -p -S -300 | pbcopy'

# exit copy-mode in a specific pane (prefix + k + 0-5)
bind-key k switch-client -T exit-copy
bind-key -T exit-copy 0 send-keys -t :.0 -X cancel
bind-key -T exit-copy 1 send-keys -t :.1 -X cancel
bind-key -T exit-copy 2 send-keys -t :.2 -X cancel
bind-key -T exit-copy 3 send-keys -t :.3 -X cancel
bind-key -T exit-copy 4 send-keys -t :.4 -X cancel
bind-key -T exit-copy 5 send-keys -t :.5 -X cancel

# Allow bell passthrough for Claude Code notifications
set -gq allow-passthrough on
set -g bell-action any
set -g monitor-bell on

# must keep this line at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
